name: Kiro EKS Policy Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # Job 1: Discover all manifest files and output them as a matrix
  discover:
    runs-on: ubuntu-latest
    outputs:
      manifests: ${{ steps.find.outputs.manifests }}
    steps:
      - uses: actions/checkout@v7

      - name: Find manifest files
        id: find
        run: |
          FILES=$(find manifests/ -type f \( -name "*.yaml" -o -name "*.yml" \) | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "manifests=$FILES" >> "$GITHUB_OUTPUT"
          echo "📋 Found manifests: $FILES"

  # Job 2: Validate and deploy each manifest independently
  validate-and-deploy:
    runs-on: ubuntu-latest
    needs: [discover]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.discover.outputs.manifests) }}
    steps:
      - uses: actions/checkout@v7

      - name: Kiro Validate
        id: kiro-validate
        uses: ./.github/actions/kiro-validate
        with:
          manifests-path: ${{ matrix.manifest }}
          policy-path: ".kiro/steering/eks-policy.md"
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}

      - name: Configure kubectl
        if: success()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.EKS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Deploy to EKS
        if: success()
        run: |
          echo "::group::Deploying ${{ matrix.manifest }}"
          if kubectl apply -f "${{ matrix.manifest }}" 2>&1 | tee /tmp/deploy-output.txt; then
            echo "::endgroup::"
            echo "## ✅ Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`${{ matrix.manifest }}\` passed policy validation and was deployed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::endgroup::"
            echo "## ❌ Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`${{ matrix.manifest }}\` passed validation but \`kubectl apply\` failed:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/deploy-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Skip deploy (validation failed)
        if: failure()
        run: |
          echo "## ⛔ Deployment Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ matrix.manifest }}\` failed policy validation and was **not deployed**." >> "$GITHUB_STEP_SUMMARY"
